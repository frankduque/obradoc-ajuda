<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Ajuda — ObraDoc</title>
  <meta name="description" content="Central de Ajuda da ObraDoc — plataforma de gestão documental para obras." />
  <link rel="icon" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #E67E22;
    }
    .sidebar-nav a {
      font-size: 14px;
    }
    nav.app-nav {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">Carregando...</div>

  <script>
    window.$docsify = {
      name: 'Central de Ajuda',
      nameLink: '/',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'index.md',
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3,
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      auto2top: true,
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
